# Default values for mpd-dlna-yamaha-avr.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

variant: mpd-dlna-yamaha-avr
# variant: mpd-pulseaudio-mqtt-ir
# variant: mpd-snapcast

image:
  repository: "ghcr.io/matgoebl/mpd-dlna-yamaha-avr"
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: false
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""
  # Value for automountServiceAccountToken
  automountToken: false

podAnnotations: {}

podSecurityContext:
  runAsUser: 10001
  runAsGroup: 10001
  fsGroup: 10002

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault
  capabilities:
    drop:
    - ALL

service:
  type: LoadBalancer
  port: 6600                          # External port of Music Player Daemon for clients.
  # only variant mpd-dlna-yamaha-avr and mpd-snapcast:
  streamport: 6601                    # External port of Music Player Stream, that is sent to yamaha receiver for playback / External port of SNAP Stream.
  # only variant mpd-dlna-yamaha-avr:
  streamhostExternal: "127.0.0.1"     # External hostname/IP of Music Player Stream, that is sent to yamaha receiver for playback.
  # only variant mpd-snapcast:
  controlport: 6602                   # External port of SNAP Control
  webport: 8000                       # External port of Snapweb Web Client
  # only for myMPD:
  mympdport: 8080                     # External port of myMPD

ingress:
  enabled: false
  # className: ""
  # annotations: {}
  # hosts:
  #   - host: chart-example.local
  #     paths:
  #       - path: /mympd
  #         port: 8080
  #         pathType: Prefix
  # tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

mpd:
  persistentVolumeClaimName: ""       # Mount persistentVolumeClaim as music directory, playlists are expected as playlists/ subfolder there.
  # only variant mpd-pulseaudio-mqtt-ir:
  pulse_server: ""
  pulse_sink: ""

# only variant mpd-dlna-yamaha-avr:
yamaha:
  host: "127.0.0.1"                   # Hostname/IP of Yamaha AVR Receiver.
  maxVolumeDb: "60"                   # Maximum AVR volume in dB for mpd volume of 100%.
  surroundProgram: "Straight"         # Surround program to be set when switching to DLNA playback.
# {{- end }}

# only variant mpd-pulseaudio-mqtt-ir:
irbridge:
  mqtt_config: ""
  poweron_volume: "16"

rescan:
  enabled: true
  hour: 3                             # Timezone is UTC
  minute: 17

# Optional myMPD WebUI, see https://jcorporation.github.io/myMPD/ and https://github.com/jcorporation/myMPD
mympd:
  enabled: false
  config:
    # see https://jcorporation.github.io/myMPD/020-configuration/configuration-files.html
    TZ: Europe/Berlin
    MYMPD_LOGLEVEL: 6
  image:
    # see https://github.com/jcorporation/myMPD/pkgs/container/mympd%2Fmympd
    repository: "ghcr.io/jcorporation/mympd/mympd"
    pullPolicy: IfNotPresent
    tag: "latest"

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

nodeSelector: {}

tolerations: []

affinity: {}
